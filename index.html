    <!-- JSON-LD: FAQPage (AI search optimized) -->

          "@type": "Question",
          "name": "Does VideoFrame Extractor upload my video to a server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. VideoFrame Extractor runs entirely in your browser using the HTML5 Canvas API. Your video file never leaves your device — nothing is uploaded to any server. The tool has no backend at all."
          }
        },

          "@type": "Question",
          "name": "What video formats does VideoFrame Extractor support?",
          "acceptedAnswer": {

            "text": "VideoFrame Extractor supports MP4, WebM, MOV, MKV, and AVI formats — any format supported by your browser's native video element. You can upload a local file via drag-and-drop or file picker, or provide a remote video URL (which must have CORS Access-Control-Allow-Origin headers)."
          }
        },
        {
          "@type": "Question",
          "name": "What frame extraction modes are available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "VideoFrame Extractor offers five extraction modes: (1) By Count — extract a fixed number of evenly distributed frames; (2) By Interval — extract frames every N seconds; (3) Manual Timestamps — extract frames at specific time points you provide; (4) Scene Change Detection — automatically detect significant visual transitions using a pixel-difference algorithm; (5) Property Walkthrough — designed for real estate and inspection videos, captures frames when the camera stops moving after a period of motion."
          }
        },
        {
          "@type": "Question",
          "name": "What image formats can I export extracted frames as?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Frames can be exported as JPEG (smallest file size, adjustable quality), PNG (lossless), or WebP (modern format, good compression). You can also resize output frames to 4K (3840px wide), Full HD 1080p, HD 720p, 480p, 360p, or keep the original video resolution. Download frames individually or as a single ZIP archive."
          }
        },
        {
          "@type": "Question",
          "name": "Is VideoFrame Extractor free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, VideoFrame Extractor is completely free to use with no account, registration, or payment required. There are no usage limits."
          }
        },
        {
          "@type": "Question",
          "name": "What is property walkthrough mode?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Property walkthrough mode is a specialized extraction mode designed for real estate tour videos or inspection recordings. It uses motion analysis to detect when the camera is moving versus stationary. A frame is captured only after the camera has been still for a configurable settle time following a period of motion. This produces a clean set of frames showing each room or area without motion blur, ideal for property listings or inspection reports."
          }
        },
        {
          "@type": "Question",
          "name": "How does scene change detection work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Scene change detection samples frames at a configurable rate (e.g., every 0.5 seconds) and computes the average pixel-level difference between consecutive frames. When the difference exceeds a configurable threshold, the current frame is flagged as a scene change and extracted. You can tune the sample rate, difference threshold, and minimum gap between detected scenes."
          }
        }
      ]
    }
